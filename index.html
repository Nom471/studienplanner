<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mein Studienplaner</title>
    
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
    <div class="header-content">
        <h1>Willkommen zurück, Lukas!</h1>
        <p>Hier ist dein Fortschritt für heute.</p>
    </div>

    <form class="form">
        <button>
            <svg width="17" height="16" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="search">
                <path d="M7.667 12.667A5.333 5.333 0 107.667 2a5.333 5.333 0 000 10.667zM14.334 14l-2.9-2.9" stroke="currentColor" stroke-width="1.333" stroke-linecap="round" stroke-linejoin="round"></path>
            </svg>
        </button>
        <input class="input" placeholder="Search anything..." required="" type="text">
        <button class="reset" type="reset">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"></path>
            </svg>
        </button>
    </form>

    <div class="header-profile">
        <div class="profile-avatar">
            <span>LP</span>
        </div>
        <div class="profile-name">
            <h4>Lukas Pfister</h4>
            <p>Mathe & Informatik</p>
        </div>
    </div>
</header>

    <aside>
        <div id="sidebar-logo">
            <div class="logo-circle">
                <div class="logo-icon-circle">
                    <span>📖</span>
                </div>
                <h3>Studienplaner</h3>
            </div>
        </div>
            <nav class="menu">
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Schedule</a></li>
                <li><a href="#">Subjects</a></li>
                <li><a href="#">Tasks</a></li>
                <li><a href="#">Progress</a></li>
                <li><a href="#">Settings</a></li>
            </ul>
            </nav>
        <div class="card" id="streak-card">
            <div class="card-title"><p>Streak</p></div>
            <div class="card-content">
                <div class="card-content-item">
                    <div class="card-content-item-icon">🔥</div>
                    <div class="card-content-item-value">7</div>
                    <div class="card-content-item-label">Tage</div>
                </div>
            </div>
        </div>
    </aside>

</body>
</html>
